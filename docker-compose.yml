version: '3.8'

services:
  # --- 1. Message Queue ---
  redis:
    image: redis:7-alpine
    container_name: log-redis
    ports:
      - "6379:6379"
    restart: always

  # --- 2. Database ---
  mongo:
    image: mongo:6-jammy
    container_name: log-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

  # --- 3. Flask Backend API ---
  backend:
    build: 
      context: ./backend
    container_name: log-backend
    command: python app.py
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - mongo
    restart: always

  # --- 4. Background Worker ---
  worker:
    build: 
      context: ./backend
    container_name: log-worker
    command: python worker.py
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - mongo
    restart: always

# Define the persistent volume for MongoDB
volumes:
  mongo_data: